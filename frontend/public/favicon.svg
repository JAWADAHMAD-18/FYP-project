<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background circle -->
  <circle cx="50" cy="50" r="50" fill="#0D9488"/>
  <!-- Globe grid -->
  <ellipse cx="50" cy="50" rx="44" ry="15" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1.2"/>
  <ellipse cx="50" cy="50" rx="44" ry="30" fill="none" stroke="rgba(255,255,255,0.13)" stroke-width="1.2"/>
  <line x1="6" y1="50" x2="94" y2="50" stroke="rgba(255,255,255,0.18)" stroke-width="1.2"/>
  <line x1="50" y1="6" x2="50" y2="94" stroke="rgba(255,255,255,0.18)" stroke-width="1.2"/>
  <path d="M50,6 Q32,28 32,50 Q32,72 50,94" fill="none" stroke="rgba(255,255,255,0.13)" stroke-width="1.2"/>
  <path d="M50,6 Q68,28 68,50 Q68,72 50,94" fill="none" stroke="rgba(255,255,255,0.13)" stroke-width="1.2"/>
  <!-- Cardinal ticks -->
  <line x1="50" y1="8" x2="50" y2="16" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="50" y1="84" x2="50" y2="92" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="8" y1="50" x2="16" y2="50" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="84" y1="50" x2="92" y2="50" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <!-- N label -->
  <text x="50" y="28" text-anchor="middle" font-size="10" font-weight="700" fill="white" font-family="sans-serif">N</text>
  <!-- Needle north -->
  <polygon points="50,30 45,52 50,48 55,52" fill="white"/>
  <!-- Needle south -->
  <polygon points="50,70 45,48 50,52 55,48" fill="rgba(255,255,255,0.4)"/>
  <!-- Center -->
  <circle cx="50" cy="50" r="5" fill="white"/>
  <circle cx="50" cy="50" r="2.5" fill="#0D9488"/>
</svg>